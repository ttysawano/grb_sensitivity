version: 0.1
mode: significance

spectrum:
  model: band
  alpha: -1.0
  beta: -2.5
  epivot_keV: 100.0

flux:
  reference_band_keV: [1.0, 1000.0]
  report_bands_keV:
    band2003_1_1000keV: [1.0, 1000.0]

curve:
  epeak_grid_keV:
    min: 10.0
    max: 10000.0
    num: 256
    spacing: log

grb:
  name: example_grb
  epeak_keV: 500.0
  peak_flux:
    value: 10.0
    unit: ph_cm2_s
    band_keV: [1.0, 1000.0]

detector:
  name: grb_detector
  response:
    path: detector_response_effective_area.csv
    quantity: effective_area_cm2
    csv_has_header: true
    energy_column: 1
    value_column: 2
    interpolation: loglog
    extrapolation: powerlaw_with_warning
    effective_area_includes_active_fraction: true
    effective_area_includes_mask: false
  geometric_area_cm2: 100.0
  active_fraction: 1.0
  aperture_solid_angle_sr: 1.0
  mask:
    open_fraction: 1.0
    response_includes_mask: false
    apply_to_source: true
    apply_to_cxb: true
  trigger:
    energy_band_keV: [10.0, 1000.0]
    accumulation_time_s: 1.0
    threshold_sigma: 8.0
    statistic: gaussian_s_over_sqrt_b

background:
  cxb:
    enabled: true
    model: moretti2009
    nominal_valid_energy_range_keV: [10.0, 200.0]
    below_valid_range_policy: truncate_with_warning
    above_valid_range_policy: evaluate_with_warning
  internal:
    mode: trigger_band_rate
    rate_cps: 0.0

numerics:
  integration_grid:
    num: 4096
    spacing: log

output:
  csv: output/example_significance.csv
  plot: null
